services:
  db:
    # Pinned major: an unpinned `postgres` silently jumps majors on any
    # recreate, and PG data dirs aren't upgradable in place.
    image: postgres:17
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d local']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Keycloak (single IdP for the dashboard login + the Claude.ai MCP connector) ──
  # Dev only: `start-dev` runs HTTP, disables strict hostname checks, and
  # `--import-realm` loads keycloak/realm-export.json on first boot. Admin
  # console at http://localhost:8080 (admin / admin). Production runs the
  # optimized image instead — see keycloak/README.md.
  keycloak-db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - kcdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak -d keycloak']
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    restart: always
    command: start-dev --import-realm
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
    volumes:
      # Realm import is create-on-first-boot. Editing realm-export.json and
      # restarting won't re-import unless the realm is deleted first (or you
      # apply the change in the admin console / via kc.sh import).
      - ./keycloak:/opt/keycloak/data/import

volumes:
  pgdata:
  kcdata:
