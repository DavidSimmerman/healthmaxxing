# XcodeGen spec — run `xcodegen generate` in this directory after changing.
# The .xcodeproj is generated and gitignored; this file is the source of truth.
name: Healthmaxxing
options:
  bundleIdPrefix: tech.simmerman
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: '5.9'
    # Set your Apple Developer team once via Xcode (Signing & Capabilities) or:
    # DEVELOPMENT_TEAM: XXXXXXXXXX
targets:
  Healthmaxxing:
    type: application
    platform: iOS
    sources: [Healthmaxxing]
    entitlements:
      path: Healthmaxxing/Healthmaxxing.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    info:
      path: Healthmaxxing/Info.plist
      properties:
        CFBundleDisplayName: Healthmaxxing
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSHealthShareUsageDescription: >-
          Reads your activity, energy, and body composition data to sync it to
          your personal health dashboard for calorie deficit tracking.
        NSHealthUpdateUsageDescription: >-
          Not used — the app only reads health data.
        NSCameraUsageDescription: >-
          Used by the dashboard's barcode scanner to look up foods.
        # Wake the app for HealthKit background delivery pushes.
        UIBackgroundModes: [processing]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.simmerman.healthmaxxing
        TARGETED_DEVICE_FAMILY: '1'
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: 'NO'
