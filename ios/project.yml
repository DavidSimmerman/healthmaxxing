# XcodeGen spec — run `xcodegen generate` in this directory after changing.
# The .xcodeproj is generated and gitignored; this file is the source of truth.
name: Healthmaxxing
options:
  bundleIdPrefix: tech.simmerman
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: '5.9'
    # Set your Apple Developer team once via Xcode (Signing & Capabilities) or:
    # DEVELOPMENT_TEAM: XXXXXXXXXX
targets:
  Healthmaxxing:
    type: application
    platform: iOS
    sources: [Healthmaxxing]
    dependencies:
      - target: HealthmaxxingWidget
        embed: true
      - sdk: WidgetKit.framework # WidgetCenter reloads from the app + WebView
    entitlements:
      path: Healthmaxxing/Healthmaxxing.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        # Shared container so the widget extension can read the saved API token.
        com.apple.security.application-groups: [group.tech.simmerman.healthmaxxing]
    info:
      path: Healthmaxxing/Info.plist
      properties:
        CFBundleDisplayName: Healthmaxxing
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSHealthShareUsageDescription: >-
          Reads your activity, energy, and body composition data to sync it to
          your personal health dashboard for calorie deficit tracking.
        NSHealthUpdateUsageDescription: >-
          Not used — the app only reads health data.
        NSCameraUsageDescription: >-
          Used by the dashboard's barcode scanner to look up foods.
        # Wake the app for HealthKit background delivery pushes.
        UIBackgroundModes: [processing]
        # Lets the home-screen widget open the app via healthmaxxing:// (so a tap
        # lands in the app, not Safari).
        CFBundleURLTypes:
          - CFBundleURLSchemes: [healthmaxxing]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.simmerman.healthmaxxing
        TARGETED_DEVICE_FAMILY: '1'
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: 'NO'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # WidgetKit extension — "calories & protein left today" home-screen widget.
  HealthmaxxingWidget:
    type: app-extension
    platform: iOS
    sources:
      - HealthmaxxingWidget
      - Healthmaxxing/SyncConfig.swift # shared config (server URL + token)
    entitlements:
      path: HealthmaxxingWidget/HealthmaxxingWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.tech.simmerman.healthmaxxing]
    info:
      path: HealthmaxxingWidget/Info.plist
      properties:
        CFBundleDisplayName: Macros Left
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.simmerman.healthmaxxing.widget
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: 'NO'
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
